# ysd_hdb 元数据生成器附加配置
# 该文件只维护需要显式命名的联查关系
# 一个 [association] 表示一条可显式 JOIN 的命名关联
# owner_table 和 target_table 填真实表名，生成器会自动转成内部 dataset 名
# 日分表只需要写表名前缀，例如 hdb_alarm，不要写 hdb_alarm_20260612
# 关联条件固定表示为 owner_table.owner_field = target_table.target_field
# JOIN 类型由调用方选择，例如 LeftJoin 会生成 left join，InnerJoin 会生成 inner join
# 示例
#
# [association]
# owner_table=hdb_record
# name=creator
# target_table=hdb_user
# owner_field=creator_id
# target_field=id
#
# 如果调用方从 record 出发调用 LeftJoin(recordSource, "creator")
# 生成的 JOIN 条件等价于
# left join hdb_user s1 on s0.creator_id = s1.id
# 其中 s0 是 hdb_record 的 SQL alias，s1 是 hdb_user 的 SQL alias

[association]
owner_table=hdb_alarm
name=point
target_table=hdb_point
owner_field=point_id
target_field=id

[association]
owner_table=hdb_point
name=device
target_table=hdb_device
owner_field=device_id
target_field=id
